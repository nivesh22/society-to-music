raw_gdelt:
  type: kedro_datasets.spark.SparkDataset
  filepath: gs://msba405-society-music-2026/Raw/gdelt/gdelt.csv
  file_format: csv
  load_args:
    header: true
    inferSchema: true

raw_spotify_charts:
  type: kedro_datasets.spark.SparkDataset
  filepath: gs://msba405-society-music-2026/Raw/Spotify_charts/charts.csv
  file_format: csv
  load_args:
    header: true
    inferSchema: true

raw_audio_features:
  type: kedro_datasets.spark.SparkDataset
  filepath: gs://msba405-society-music-2026/Raw/audio_features/audio_features.csv
  file_format: csv
  load_args:
    header: true
    inferSchema: true

# ── Outputs → Snowflake ───────────────────────────────────────────────────────
# daily_music_features and audio_emotion_scores are MemoryDatasets (no entry needed)

daily_news_sentiment:
  type: society_to_music.datasets.AtomicSnowflakeDataset
  table_name: NEWS_SENTIMENT
  credentials: snowflake_credentials
  schema: PROCESSED

curated_music_features:
  type: society_to_music.datasets.AtomicSnowflakeDataset
  table_name: MUSIC_FEATURES
  credentials: snowflake_credentials
  schema: CURATED

# ── Analytics pipeline outputs ────────────────────────────────────────────────

music_news_joined:
  type: society_to_music.datasets.AtomicSnowflakeDataset
  table_name: MUSIC_NEWS_JOINED
  credentials: snowflake_credentials
  schema: CURATED

feature_correlations_olap:
  type: society_to_music.datasets.AtomicSnowflakeDataset
  table_name: FEATURE_CORRELATIONS_OLAP
  credentials: snowflake_credentials
  schema: CURATED
